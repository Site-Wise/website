<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAFAF7" />
  <meta name="description" content="Sitewise — the site expense system for Indian contractors, supervisors, and accountants. Track materials, mazdoor wages, vendor bills, petty cash, and advances across every site. Self-hostable, multi-user, PWA-ready." />
  <meta name="keywords" content="construction expense management, site expense register, material ledger, labour payment register, vendor bill tracker, mazdoor wages, contractor app India, PocketBase, PWA, self-hosted" />
  <meta name="author" content="Sitewise" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sitewise.in/" />
  <meta property="og:title" content="Sitewise — Know exactly where every rupee went on every site" />
  <meta property="og:description" content="The site expense system for Indian contractors. Materials, labour, petty cash, vendor bills, and advances in one shared khata." />
  <meta property="og:image" content="https://sitewise.in/og-image.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://sitewise.in/" />
  <meta property="twitter:title" content="Sitewise — Know exactly where every rupee went on every site" />
  <meta property="twitter:description" content="The site expense system for Indian contractors. Materials, labour, petty cash, vendor bills, and advances in one shared khata." />
  <meta property="twitter:image" content="https://sitewise.in/og-image.jpg" />

  <!-- Favicon — Sitewise mark -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Fonts — loaded non-blocking (print->all swap) so they never block first paint.
       Trimmed to weights actually used. display=swap shows fallback text immediately. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  </noscript>

  <title>Sitewise — Know exactly where every rupee went on every site</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
